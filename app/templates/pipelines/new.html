{% extends "base.html" %}

{% block title %}Add Pipeline - Pipeline Maturity{% endblock %}

{% block content %}
<h1>Add Pipeline</h1>

<form method="POST" class="mt-3" style="max-width: 600px;">
    <div class="mb-3">
        <label for="repository_url" class="form-label">Repository URL</label>
        <input type="text" class="form-control" id="repository_url" name="repository_url" required
               placeholder="https://github.com/org/repo.git">
        <div class="form-text">Name and team are derived from the URL automatically.</div>
    </div>
    <button type="submit" class="btn btn-primary">Add Pipeline</button>
    <a href="{{ url_for('pipelines.list_pipelines') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
